<!DOCTYPE html>
<html>
<head>
<title>Search Results</title>
</head>
<body>

<h2>Search Results</h2>

<form id="form">

<table border="1">
<tr>
<th>Select</th>
<th>Book</th>
<th>Author</th>
</tr>

<tr>
<td><input type="radio" name="book" value="Java|James"></td>
<td>Java</td>
<td>James</td>
</tr>

<tr>
<td><input type="radio" name="book" value="Python|Guido"></td>
<td>Python</td>
<td>Guido</td>
</tr>

</table>

<br>

<p id="error" style="color:red"></p>

<button type="button" onclick="next()">Proceed</button>

</form>

<script>
function next(){
    let selected = document.querySelector('input[name="book"]:checked');

    if(!selected){
        document.getElementById("error").innerText = "Select a book";
        return;
    }

    localStorage.setItem("selectedBook", selected.value);

    let role = localStorage.getItem("role");

    if(role === "admin"){
        window.location = "issue.html";   // admin flow
    } else {
        window.location = "request.html"; // user flow
    }
}
</script>

</body>
</html>
